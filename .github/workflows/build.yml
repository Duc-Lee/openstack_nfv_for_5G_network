name: Build and Check
on:
  push:
    branches: [ main ]

jobs:
  check-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        pip install pytest fastapi uvicorn sqlalchemy psycopg2-binary
    - name: Run tests
      run: pytest src/services

