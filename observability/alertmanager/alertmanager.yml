global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: '5g-orchestrator-webhook'

receivers:
- name: '5g-orchestrator-webhook'
  webhook_configs:
  - url: 'http://orchestrator-service:8005/webhook/scale'
    send_resolved: true
