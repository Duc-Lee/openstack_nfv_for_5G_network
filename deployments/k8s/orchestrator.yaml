apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: 5g-core-orchestrator:latest
        ports:
        - containerPort: 8005
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
spec:
  ports:
  - port: 8005
    targetPort: 8005
  selector:
    app: orchestrator
