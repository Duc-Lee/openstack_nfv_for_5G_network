apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream auth_backend { server auth:8004; }
        upstream amf_backend { server amf:8000; }
        upstream smf_backend { server smf:8001; }
        upstream upf_backend { server upf:8002; }
        upstream infra_backend { server infra:8003; }

        server {
            listen 80;
            location /auth/ { proxy_pass http://auth_backend/; }
            location /amf/ { proxy_pass http://amf_backend/; }
            location /smf/ { proxy_pass http://smf_backend/; }
            location /upf/ { proxy_pass http://upf_backend/; }
            location /infra/ { proxy_pass http://infra_backend/; }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: gateway
