apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: infra-manager
  template:
    metadata:
      labels:
        app: infra-manager
    spec:
      containers:
      - name: infra-manager
        image: 5g-core-infra:latest
        ports:
        - containerPort: 8003
        env:
        - name: OS_AUTH_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: OS_AUTH_URL
        - name: OS_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: OS_USERNAME
        - name: OS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: OS_PASSWORD
        - name: OS_PROJECT_NAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: OS_PROJECT_NAME
        - name: OS_REGION_NAME
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: OS_REGION_NAME
---
apiVersion: v1
kind: Service
metadata:
  name: infra
spec:
  ports:
  - port: 8003
    targetPort: 8003
  selector:
    app: infra-manager
