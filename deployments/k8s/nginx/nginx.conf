events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth:8004;
    }
    upstream amf_service {
        server amf:8000;
    }
    upstream smf_service {
        server smf:8001;
    }
    upstream upf_service {
        server upf:8002;
    }
    upstream infra_manager {
        server infra:8003;
    }

    server {
        listen 80;

        location /auth/ {
            proxy_pass http://auth_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /amf/ {
            proxy_pass http://amf_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /smf/ {
            proxy_pass http://smf_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /upf/ {
            proxy_pass http://upf_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /infra/ {
            proxy_pass http://infra_manager/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /orchestrator/ {
            proxy_pass http://orchestrator:8005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check for the gateway itself
        location /health {
            return 200 'API Gateway is Healthy';
            add_header Content-Type text/plain;
        }
    }
}
